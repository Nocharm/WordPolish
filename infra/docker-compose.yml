name: word-templator

services:
  backend:
    build:
      context: ../backend
    env_file: ../.env
    volumes:
      - filedata:/data
    command: ["sh", "-c", "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"]
    restart: unless-stopped

  frontend:
    build:
      context: ../frontend
    env_file: ../.env
    environment:
      INTERNAL_API_BASE: http://backend:8000
    depends_on:
      - backend
    restart: unless-stopped

  proxy:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
    restart: unless-stopped

volumes:
  filedata:
